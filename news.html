<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お知らせ｜相模合気道連盟</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root{--navy:#1a2744;--gold:#9a7b0a;--gold-light:#c4960e;--white:#ffffff;--cream:#fafaf7;--gray:#6b7280;--light:#f2efe8;--border:#e8e2d6;}
    *{box-sizing:border-box;margin:0;padding:0;}body{font-family:'Noto Sans JP',sans-serif;background:var(--white);color:var(--navy);line-height:1.8;}
    header{background:var(--white);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:1000;box-shadow:0 2px 12px rgba(0,0,0,0.06);}
    .header-inner{max-width:1100px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:68px;}
    .logo{font-family:'Noto Serif JP',serif;font-size:19px;font-weight:700;color:var(--navy);letter-spacing:2px;text-decoration:none;}
    .logo span{font-size:10px;color:var(--gold-light);display:block;letter-spacing:2px;font-weight:400;}
    nav{display:flex;}nav a{color:var(--gray);text-decoration:none;font-size:13px;padding:8px 11px;transition:all .2s;position:relative;}
    nav a::after{content:'';position:absolute;bottom:0;left:50%;right:50%;height:2px;background:var(--gold-light);transition:all .2s;}
    nav a:hover::after,nav a.active::after{left:8px;right:8px;}nav a:hover,nav a.active{color:var(--navy);}
    .hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:8px;}
    .hamburger span{display:block;width:24px;height:2px;background:var(--navy);}
    .mobile-nav{display:none;background:var(--white);border-top:1px solid var(--border);}
    .mobile-nav a{display:block;padding:14px 24px;color:var(--navy);text-decoration:none;font-size:14px;border-bottom:1px solid var(--border);}
    .mobile-nav.open{display:block;}
    .page-hero{background:linear-gradient(160deg,#f8f6f0 0%,var(--white) 100%);padding:64px 24px 48px;text-align:center;border-bottom:1px solid var(--border);}
    .page-label{font-size:11px;letter-spacing:4px;color:var(--gold-light);margin-bottom:10px;}
    .page-title{font-family:'Noto Serif JP',serif;font-size:clamp(28px,5vw,44px);font-weight:700;letter-spacing:6px;color:var(--navy);}
    .page-line{width:40px;height:2px;background:var(--gold-light);margin:14px auto 0;}
    main{max-width:800px;margin:0 auto;padding:64px 24px;}
    .year-section{margin-bottom:48px;}
    .year-heading{font-family:'Noto Serif JP',serif;font-size:22px;color:var(--navy);margin-bottom:8px;padding-bottom:12px;border-bottom:2px solid var(--light);}
    .news-item{display:flex;align-items:flex-start;gap:16px;padding:18px 0;border-bottom:1px solid var(--border);}
    .news-date{font-size:13px;color:var(--gold);font-weight:700;white-space:nowrap;min-width:80px;}
    .news-tag{font-size:11px;font-weight:700;padding:2px 8px;border-radius:3px;white-space:nowrap;flex-shrink:0;}
    .tag-new{background:var(--navy);color:#fff;}
    .tag-event{background:var(--gold);color:#fff;}
    .tag-info{background:var(--border);color:var(--navy);}
    .news-text{font-size:14px;line-height:1.8;color:var(--navy);}
    .loading{text-align:center;padding:48px;color:var(--gray);}
    footer{background:var(--navy);color:rgba(255,255,255,.6);text-align:center;padding:32px 24px;font-size:12px;margin-top:80px;}
    footer strong{color:rgba(255,255,255,.9);}
    @media(max-width:768px){
      nav{display:none;}.hamburger{display:flex;}
      .news-item{flex-wrap:wrap;gap:8px;}
    }
  </style>
</head>
<body>
<header>
  <div class="header-inner">
    <a class="logo" href="index.html">相模合気道連盟<span>SAGAMI AIKIDO FEDERATION</span></a>
    <nav>
      <a href="index.html">ホーム</a>
      <a href="news.html" class="active">お知らせ</a>
      <a href="instructors.html">指導者</a>
      <a href="schedule.html">スケジュール</a>
      <a href="contact.html">ご連絡先</a>
      <a href="access.html">アクセス</a>
      <a href="photos.html">写真</a>
      <a href="links.html">リンク</a>
    </nav>
    <div class="hamburger" onclick="document.querySelector('.mobile-nav').classList.toggle('open')">
      <span></span><span></span><span></span>
    </div>
  </div>
  <div class="mobile-nav">
    <a href="index.html">ホーム</a>
    <a href="news.html">お知らせ</a>
    <a href="instructors.html">指導者</a>
    <a href="schedule.html">スケジュール</a>
    <a href="contact.html">ご連絡先</a>
    <a href="access.html">アクセス</a>
    <a href="photos.html">写真</a>
    <a href="links.html">リンク</a>
  </div>
</header>

<div class="page-hero">
  <div class="page-label">INFORMATION</div>
  <h1 class="page-title">お知らせ</h1>
  <div class="page-line"></div>
</div>

<main>
  <div id="newsContainer"><div class="loading">読み込み中...</div></div>
</main>

<footer>
  <strong>相模合気道連盟</strong><br>
  © 2025 Sagami Aikido Federation. All rights reserved.
</footer>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getFirestore, collection, getDocs, orderBy, query }
    from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  const firebaseConfig = {
    apiKey: "AIzaSyBfhzD-KOcyAneUEHDeAYx1WB7Tcefc1So",
    authDomain: "sagami-aikido-b5961.firebaseapp.com",
    projectId: "sagami-aikido-b5961",
    storageBucket: "sagami-aikido-b5961.firebasestorage.app",
    messagingSenderId: "770248355445",
    appId: "1:770248355445:web:3104563942dfed363d923c"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const TAG_CLASS = {'新着':'tag-new','行事':'tag-event','お知らせ':'tag-info'};

  async function loadNews(){
    const container = document.getElementById('newsContainer');
    try{
      const q = query(collection(db,'news'), orderBy('date','desc'));
      const snap = await getDocs(q);
      const items = snap.docs.map(d=>d.data());

      if(!items.length){
        container.innerHTML='<div class="loading">お知らせはありません</div>';
        return;
      }

      // 年ごとにグループ化
      const byYear = {};
      items.forEach(item=>{
        const year = item.date ? item.date.split('.')[0] : '不明';
        if(!byYear[year]) byYear[year]=[];
        byYear[year].push(item);
      });

      const years = Object.keys(byYear).sort((a,b)=>b-a);
      container.innerHTML = years.map(year=>`
        <div class="year-section">
          <h2 class="year-heading">${year}年</h2>
          ${byYear[year].map(n=>{
            const tagClass = TAG_CLASS[n.category]||'tag-info';
            const linkHtml = n.url
              ? `<a href="${n.url}" target="_blank" rel="noopener"
                   style="display:inline-block;margin-top:6px;font-size:12px;
                          color:var(--gold-light);text-decoration:none;
                          border:1px solid var(--gold-light);padding:2px 10px;border-radius:3px;">
                   🔗 詳細を見る</a>` : '';
            return `<div class="news-item">
              <span class="news-date">${n.date}</span>
              <span class="news-tag ${tagClass}">${n.category}</span>
              <span class="news-text">${n.text}${linkHtml ? '<br>'+linkHtml : ''}</span>
            </div>`;
          }).join('')}
        </div>
      `).join('');
    }catch(e){
      container.innerHTML='<div class="loading">読み込みに失敗しました</div>';
    }
  }

  loadNews();
</script>
</body>
</html>
